server {
    listen [::]:80 default_server;
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Alinhado com upload_max_filesize do PHP e nginx.conf global
    client_max_body_size 30M;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Roteamento SPA / Laravel — tenta arquivo, diretório, depois index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Arquivos que não precisam de log
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Retorna 404 via Laravel (permite páginas de erro customizadas)
    error_page 404 /index.php;

    # PHP-FPM — passa para o serviço app na porta 9000
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        include fastcgi_params;
    }

    # Cache longo para assets estáticos gerados pelo Vite (hash no nome)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bloqueia acesso a arquivos ocultos (exceto .well-known para Let's Encrypt)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}