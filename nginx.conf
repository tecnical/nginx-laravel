user nginx;

worker_processes auto;

pcre_jit on;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Não expõe a versão do nginx nos headers — segurança básica
    server_tokens off;

    # Tamanho máximo de upload — alinhado com o virtual host e o PHP
    client_max_body_size 30M;

    # Transferência eficiente de arquivos estáticos via kernel
    sendfile on;
    tcp_nopush on;

    # Compressão de respostas
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Helper para proxy de WebSockets (usado pelo Reverb via proxy reverso)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Virtual hosts — o nginx-laravel.conf é copiado aqui pelo Dockerfile
    include /etc/nginx/http.d/*.conf;
}

pid /var/run/nginx.pid;